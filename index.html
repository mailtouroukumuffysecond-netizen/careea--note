    const { useState, useRef, useEffect } = React;

    // --- IndexedDB Local Storage ---
    const DB_NAME = 'CarrierNoteLocalDB';
    const STORE_NAME = 'notes';

    const initDB = () => {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = (e) => {
          if (!e.target.result.objectStoreNames.contains(STORE_NAME)) {
            e.target.result.createObjectStore(STORE_NAME);
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    };

    const saveToDB = async (key, data) => {
      try {
        const db = await initDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readwrite');
          const store = tx.objectStore(STORE_NAME);
          store.put(data, key);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      } catch (error) {
        console.warn('IndexedDB save failed:', error);
        throw error;
      }
    };

    const loadFromDB = async (key) => {
      try {
        const db = await initDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readonly');
          const store = tx.objectStore(STORE_NAME);
          const request = store.get(key);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      } catch (error) {
        console.warn('IndexedDB load failed:', error);
        throw error;
      }
    };

    // --- Local Storage (Fallback) ---
    const saveToLocalStorage = (key, data) => {
      try {
        localStorage.setItem(key, JSON.stringify(data));
      } catch (e) {
        console.warn('LocalStorage quota exceeded or not available');
      }
    };

    const loadFromLocalStorage = (key) => {
      try {
        const item = localStorage.getItem(key);
        return item ? JSON.parse(item) : null;
      } catch (e) {
        return null;
      }
    };

    const copyToClipboard = (text) => {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.style.position = "fixed"; 
      textArea.style.left = "-9999px";
      document.body.appendChild(textArea);
      textArea.select();
      try {
        document.execCommand('copy');
        return true;
      } catch (err) {
        console.error('コピー失敗', err);
        return false;
      } finally {
        document.body.removeChild(textArea);
      }
    };

    const AutoFitText = ({ text, minSize = 12, maxSize = 36, className = "" }) => {
      const containerRef = useRef(null);
      const textRef = useRef(null);
      const [fontSize, setFontSize] = useState(maxSize);
      const [isCalculated, setIsCalculated] = useState(false);

      useEffect(() => {
        if (!containerRef.current || !textRef.current) return;
        if (!text) {
          setIsCalculated(true);
          return;
        }
        
        let low = minSize;
        let high = maxSize;
        let best = minSize;

        while (low <= high) {
          const mid = Math.floor((low + high) / 2);
          textRef.current.style.fontSize = `${mid}px`;
          
          if (textRef.current.scrollHeight <= containerRef.current.clientHeight && 
              textRef.current.scrollWidth <= containerRef.current.clientWidth) {
            best = mid;
            low = mid + 1;
          } else {
            high = mid - 1;
          }
        }

        textRef.current.style.fontSize = `${best}px`;
        setFontSize(best);
        setIsCalculated(true);
      }, [text, maxSize, minSize]);

      return (
        <div ref={containerRef} className={`w-full h-full overflow-hidden relative ${className}`} style={{ opacity: isCalculated ? 1 : 0 }}>

            {text}
          </div>
        </div>
      );
    };

    const compressImageTo100KB = (img) => {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      let width = img.width, height = img.height, max_dim = 800;
      
      if (width > max_dim || height > max_dim) {
        if (width > height) { height *= max_dim / width; width = max_dim; }
        else { width *= max_dim / height; height = max_dim; }
      }
      
      let quality = 0.8; 
      canvas.width = width; canvas.height = height; 
      ctx.drawImage(img, 0, 0, width, height);
      let dataUrl = canvas.toDataURL('image/jpeg', quality);
      let sizeKB = Math.round(dataUrl.length * 3 / 4) / 1024;
      
      let attempts = 0;
      const MAX_ATTEMPTS = 15;

      while (sizeKB > 100 && attempts < MAX_ATTEMPTS) {
        if (quality > 0.3) {
          quality -= 0.1;
        } else {
          width *= 0.8; height *= 0.8; 
          canvas.width = width; canvas.height = height; 
          ctx.clearRect(0, 0, canvas.width, canvas.height); 
          ctx.drawImage(img, 0, 0, width, height);
          quality = 0.7; 
        }
        dataUrl = canvas.toDataURL('image/jpeg', quality); 
        sizeKB = Math.round(dataUrl.length * 3 / 4) / 1024;
        attempts++;
      }
      return dataUrl;
    };
